name: "PR"
on:
  pull_request:
    branches:
      - 'main'
jobs:
    build:
      name: Java 11 | Build
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - name: Set up JDK 11
          uses: actions/setup-java@v4
          with:
            java-version: 11
            distribution: 'temurin'
            cache: 'maven'
        - name: Build & run unit tests
          run: mvn --show-version --batch-mode test
    e2e:
      needs: build
      name: Neo4j ${{ matrix.neo4j_version }} (EE? ${{ matrix.enterprise }})
      runs-on: ubuntu-latest
      strategy:
        matrix:
          neo4j_version:
            - "3.5"
            - "4.0"
            - "4.1"
            - "4.2"
            - "4.3"
            - "4.4"
            - "5.1"
            - "5.2"
            - "5.3"
            - "5.4"
            - "5.5"
            - "5.6"
            - "5.7"
            - "5.8"
            - "5.9"
            - "5.10"
            - "5.11"
            - "5.12"
            - "5.13"
            - "5.14"
            - "5.15"
            - "5.16"
            - "5.17"
            - "5.18"
            - "5.19"
            - "5.20"
            - "5.21"
            - "5.22"
            - "5.23"
            - "5.24"
            - "5.25"
            - "5.26"
          enterprise:
            - "true"
            - "false"
      steps:
        - uses: actions/checkout@v4
        - name: Set up JDK 11
          uses: actions/setup-java@v4
          with:
            java-version: 11
            distribution: 'temurin'
            cache: 'maven'

        - name: Run e2e tests
          run: mvn --quiet --show-version --batch-mode verify
          env:
            NEO4J_VERSION: ${{ matrix.neo4j_version }}
            ENTERPRISE: ${{ matrix.enterprise }}
